version: 2

sources:
  - name: sigma_de
    database: SIGMA_DE
    schema: PUBLIC
    tables:
      - name: fact_transactions
        identifier: FACT_TRANSACTIONS
      - name: dim_merchant
        identifier: DIM_MERCHANT

models:
  - name: stg_transactions
    description: Cleaned transaction fact records from Snowflake.
    columns:
      - name: transaction_id
        description: Unique transaction identifier.
        tests:
          - not_null
          - unique
      - name: amount
        description: Transaction amount in USD.
        tests:
          - not_null
      - name: status
        description: Transaction status.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['COMPLETED', 'FAILED', 'PENDING']
      - name: merchant_id
        description: Merchant identifier.
        tests:
          - not_null
      - name: customer_id
        description: Customer identifier.
        tests:
          - not_null
      - name: transaction_date
        description: Date of the transaction.
        tests:
          - not_null
      - name: payment_method
        description: Payment method used for the transaction.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CREDIT_CARD', 'DEBIT_CARD', 'UPI']
