version: 2

models:
  - name: mart_merchant_performance
    description: Merchant-level transaction KPIs for Sigma DataTech.
    columns:
      - name: merchant_id
        description: Merchant identifier.
        tests:
          - not_null
          - unique
      - name: merchant_name
        description: Human-readable merchant name.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['__INTENTIONAL_FAIL_FOR_LAB__']
      - name: total_revenue
        description: Revenue from completed transactions only.
        tests:
          - not_null
      - name: total_transactions
        description: Count of all transactions for the merchant.
        tests:
          - not_null
      - name: failed_count
        description: Count of failed transactions for the merchant.
        tests:
          - not_null
      - name: failure_rate_pct
        description: Percent of transactions that failed.
        tests:
          - not_null
      - name: unique_customers
        description: Number of distinct customers for the merchant.
        tests:
          - not_null
